services:
  # PostgreSQL データベース
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - default
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=au_mod_installer
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d au_mod_installer"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # API Server
  au-mod-installer-server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    restart: unless-stopped
    networks:
      - default
      - cloudflared
    ports:
      - "8180:8180"
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - PORT=8180
      - DATABASE_URL=postgres://postgres:password@postgres:5432/au_mod_installer?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8180${PATH_PREFIX}${BASE_PATH}/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

    # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: au-mod-installer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      au-mod-installer-server:
        condition: service_healthy
    profiles:
      - with-nginx
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:

networks:
  default:
    driver: bridge
  cloudflared:
    external: true

