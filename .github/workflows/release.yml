# .github/workflows/release.yml
name: goreleaser

on:
  push:
    # run only against tags
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    env:
      cache-name: cache-go-mod
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@41b837e47d7f85214629d255b9c4bc3fcbe9fd63 # v3.0
        with:
          platform: x64
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false
      - name: Cache Go modules and build cache
        id: restore-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-crossbuild-windows-amd64-
            ${{ runner.os }}-go-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}
            ${{ runner.os }}-go-${{ env.cache-name }}-
            ${{ runner.os }}-go-
            ${{ runner.os }}-
      - name: Generate assets
        run: go generate ./client
      - name: Prebuild for Windows cross-compilation
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss - prebuilding standard library for Windows"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
            go build -v -trimpath ./client
        env:
          GOCACHE: /home/runner/.cache/go-build
      - name: Get previous stable release
        id: get_previous_stable
        run: |
          CURRENT_TAG=${GITHUB_REF_NAME}
          echo "Current tag: $CURRENT_TAG"

          # List tags, filter out pre-releases (containing '-'), exclude current tag, sort version, take last
          PREVIOUS_STABLE=$(git tag -l "v*" | grep -v "-" | grep -v "^$CURRENT_TAG$" | sort -V | tail -n 1)
          echo "Previous stable release: $PREVIOUS_STABLE"
          if [[ -z "$PREVIOUS_STABLE" ]]; then
            echo "No previous stable release found."
            echo "previous_stable=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$CURRENT_TAG" != *"-"* ]]; then
            echo "previous_stable=$PREVIOUS_STABLE" >> $GITHUB_OUTPUT
          else
            echo "Current release is a pre-release"
            echo "Skip setting previous_stable."
            echo "previous_stable=" >> $GITHUB_OUTPUT
          fi
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.get_previous_stable.outputs.previous_stable }}
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Output Release Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "Release: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          # Release notes link
          echo "Release Notes: [View on GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
          # List artifacts
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          for file in dist/*; do
            if [ -f "$file" ]; then
              echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          # Include metadata.json content
          if [ -f dist/metadata.json ]; then
            echo "### Metadata" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat dist/metadata.json >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          # Cache state
          echo "### Cache State" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.restore-cache.outputs.cache-hit }}" == "true" ]; then
            echo "Go module cache was restored from cache." >> $GITHUB_STEP_SUMMARY
          else
            echo "Go module cache was not restored from cache." >> $GITHUB_STEP_SUMMARY
          fi
          echo "Cache prime key: ${{ steps.restore-cache.outputs.cache-primary-key }}" >> $GITHUB_STEP_SUMMARY
          echo "Cache matched key: ${{ steps.restore-cache.outputs.cache-matched-key }}" >> $GITHUB_STEP_SUMMARY
      - name: Save Go module cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
