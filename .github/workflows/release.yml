# .github/workflows/release.yml
name: goreleaser

on:
  push:
    # run only against tags
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    env:
      cache-name: cache-go-mod
    runs-on: windows-latest
    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.MUS_LIBS_PAT }}
          submodules: recursive
          persist-credentials: false
      - name: Stage Discord SDK DLL
        run: |
          $dll = Get-ChildItem -Path mus-libs -Recurse -Filter discord_partner_sdk.dll | Select-Object -First 1
          if (-not $dll) { throw "discord_partner_sdk.dll not found in mus-libs" }
          Copy-Item $dll.FullName -Destination lib\discord_partner_sdk.dll -Force
      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@41b837e47d7f85214629d255b9c4bc3fcbe9fd63 # v3.0
        with:
          platform: x64
      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"
      - name: Install WiX v7
        run: |
          dotnet tool install --global wix --version 7.*
          echo "$env:USERPROFILE\\.dotnet\\tools" >> $env:GITHUB_PATH
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false
      - name: Cache Go modules and build cache
        id: restore-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-crossbuild-windows-amd64-
            ${{ runner.os }}-go-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}
            ${{ runner.os }}-go-${{ env.cache-name }}-
            ${{ runner.os }}-go-
            ${{ runner.os }}-
      - name: Generate assets
        run: go generate ./client
      - name: Get previous stable release
        id: get_previous_stable
        run: |
          $currentTag = $env:GITHUB_REF_NAME
          Write-Host "Current tag: $currentTag"

          $tags = git tag -l "v*" | Where-Object { $_ -notmatch "-" -and $_ -ne $currentTag }
          $sorted = $tags | Sort-Object { [version]($_.TrimStart("v")) }
          $previousStable = $sorted | Select-Object -Last 1

          if (-not $previousStable) {
            Write-Host "No previous stable release found."
            "previous_stable=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($currentTag -notmatch "-") {
            "previous_stable=$previousStable" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Current release is a pre-release"
            "previous_stable=" >> $env:GITHUB_OUTPUT
          }
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.get_previous_stable.outputs.previous_stable }}
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Output Release Summary
        run: |
          "## Release Summary" >> $env:GITHUB_STEP_SUMMARY
          "Release: ${{ github.ref_name }}" >> $env:GITHUB_STEP_SUMMARY
          "Release Notes: [View on GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $env:GITHUB_STEP_SUMMARY
          "### Artifacts" >> $env:GITHUB_STEP_SUMMARY
          Get-ChildItem -Path dist -File | ForEach-Object {
            "- $($_.Name)" >> $env:GITHUB_STEP_SUMMARY
          }
          "" >> $env:GITHUB_STEP_SUMMARY
          if (Test-Path dist/metadata.json) {
            "### Metadata" >> $env:GITHUB_STEP_SUMMARY
            "```json" >> $env:GITHUB_STEP_SUMMARY
            Get-Content dist/metadata.json >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "```" >> $env:GITHUB_STEP_SUMMARY
          }
          "### Cache State" >> $env:GITHUB_STEP_SUMMARY
          if ("${{ steps.restore-cache.outputs.cache-hit }}" -eq "true") {
            "Go module cache was restored from cache." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "Go module cache was not restored from cache." >> $env:GITHUB_STEP_SUMMARY
          }
          "Cache prime key: ${{ steps.restore-cache.outputs.cache-primary-key }}" >> $env:GITHUB_STEP_SUMMARY
          "Cache matched key: ${{ steps.restore-cache.outputs.cache-matched-key }}" >> $env:GITHUB_STEP_SUMMARY
      - name: Save Go module cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
