# .github/workflows/build.yml
name: build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write
  attestations: write

env:
  cache-name: cache-go-mod

jobs:
  setup:
    runs-on: windows-latest
    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MUS_LIBS_PAT }}
          submodules: recursive
          persist-credentials: false
      - name: Stage Discord SDK DLL
        run: |
          $dlls = @(Get-ChildItem -Path mus-libs -Recurse -Filter discord_partner_sdk.dll)
          if ($dlls.Count -eq 0) { throw "discord_partner_sdk.dll not found in mus-libs" }
          elseif ($dlls.Count -ne 1) { throw "multiple discord_partner_sdk.dll files found; please ensure exactly one match" }
          else { Copy-Item $dlls[0].FullName -Destination lib\discord_partner_sdk.dll -Force }
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: false
      - name: Generate assets
        run: go generate ./client
      - name: Upload prepared source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prepared-source-${{ github.sha }}
          path: |
            .
            !**/.git/**
          if-no-files-found: error

  snapshot:
    needs: setup
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MUS_LIBS_PAT }}
          submodules: recursive
          persist-credentials: false
      - name: Download prepared source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prepared-source-${{ github.sha }}
          path: .
      - name: Normalize prepared source
        run: |
          $artifactRoot = "prepared-source-$env:GITHUB_SHA"
          if (Test-Path $artifactRoot) {
            Get-ChildItem -Force $artifactRoot | Move-Item -Destination . -Force
            Remove-Item $artifactRoot -Recurse -Force
          }
      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@41b837e47d7f85214629d255b9c4bc3fcbe9fd63 # v3.0
        with:
          platform: x64
      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0.x"
      - name: Install WiX v7
        run: |
          dotnet tool install --global wix --version 7.*
          echo "$env:USERPROFILE\\.dotnet\\tools" >> $env:GITHUB_PATH
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: false
      - name: Cache Go modules and build cache
        id: restore-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-crossbuild-windows-amd64-
            ${{ runner.os }}-go-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}
            ${{ runner.os }}-go-${{ env.cache-name }}-
            ${{ runner.os }}-go-
            ${{ runner.os }}-
      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --snapshot --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapshot-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14
      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapshot-installer
          archive: false
          path: dist/*.msi
          if-no-files-found: error
          retention-days: 14
      - name: Save Go module cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}

  release:
    needs: setup
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MUS_LIBS_PAT }}
          submodules: recursive
          persist-credentials: false
      - name: Download prepared source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prepared-source-${{ github.sha }}
          path: .
      - name: Normalize prepared source
        run: |
          $artifactRoot = "prepared-source-$env:GITHUB_SHA"
          if (Test-Path $artifactRoot) {
            Get-ChildItem -Force $artifactRoot | Move-Item -Destination . -Force
            Remove-Item $artifactRoot -Recurse -Force
          }
      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@41b837e47d7f85214629d255b9c4bc3fcbe9fd63 # v3.0
        with:
          platform: x64
      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0.x"
      - name: Install WiX v7
        run: |
          dotnet tool install --global wix --version 7.*
          echo "$env:USERPROFILE\\.dotnet\\tools" >> $env:GITHUB_PATH
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: false
      - name: Cache Go modules and build cache
        id: restore-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-crossbuild-windows-amd64-
            ${{ runner.os }}-go-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}
            ${{ runner.os }}-go-${{ env.cache-name }}-
            ${{ runner.os }}-go-
            ${{ runner.os }}-
      - name: Get previous stable release
        id: get_previous_stable
        run: |
          $currentTag = $env:GITHUB_REF_NAME
          Write-Host "Current tag: $currentTag"

          $tags = git tag -l "v*" | Where-Object { $_ -notmatch "-" -and $_ -ne $currentTag }
          $sorted = $tags | Sort-Object { [version]($_.TrimStart("v")) }
          $previousStable = $sorted | Select-Object -Last 1

          if (-not $previousStable) {
            Write-Host "No previous stable release found."
            "previous_stable=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($currentTag -notmatch "-") {
            "previous_stable=$previousStable" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Current release is a pre-release"
            "previous_stable=" >> $env:GITHUB_OUTPUT
          }
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.get_previous_stable.outputs.previous_stable }}
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-${{ github.sha }}
          path: dist/*.msi
          if-no-files-found: error
          retention-days: 14
      - name: Output Release Summary
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CACHE_HIT: ${{ steps.restore-cache.outputs.cache-hit }}
          CACHE_PRIMARY_KEY: ${{ steps.restore-cache.outputs.cache-primary-key }}
          CACHE_MATCHED_KEY: ${{ steps.restore-cache.outputs.cache-matched-key }}
        run: |
          $summaryPath = $env:GITHUB_STEP_SUMMARY
          Add-Content -Path $summaryPath -Value '## Release Summary'
          Add-Content -Path $summaryPath -Value "Release: $env:GITHUB_REF_NAME"
          Add-Content -Path $summaryPath -Value "Release Notes: [View on GitHub]($env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/releases/tag/$env:GITHUB_REF_NAME)"
          Add-Content -Path $summaryPath -Value '### Artifacts'
          if (Test-Path dist) {
            Get-ChildItem -Path dist -File | ForEach-Object { Add-Content -Path $summaryPath -Value ("- {0}" -f $_.Name) }
          } else {
            Add-Content -Path $summaryPath -Value '- (no dist directory)'
          }
          if (Test-Path dist/metadata.json) {
            Add-Content -Path $summaryPath -Value '### Metadata'
            Add-Content -Path $summaryPath -Value '```json'
            Get-Content dist/metadata.json | ForEach-Object { Add-Content -Path $summaryPath -Value $_ }
            Add-Content -Path $summaryPath -Value '```'
          }
          Add-Content -Path $summaryPath -Value '### Cache State'
          if ($env:CACHE_HIT -eq 'true') {
            Add-Content -Path $summaryPath -Value 'Go module cache was restored from cache.'
          } else {
            Add-Content -Path $summaryPath -Value 'Go module cache was not restored from cache.'
          }
          Add-Content -Path $summaryPath -Value "Cache prime key: $env:CACHE_PRIMARY_KEY"
          Add-Content -Path $summaryPath -Value "Cache matched key: $env:CACHE_MATCHED_KEY"
      - name: Save Go module cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-crossbuild-windows-amd64-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
