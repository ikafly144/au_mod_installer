name: ci
on:
  push:
    branches:
      - master
    paths:
      - "**.go"
      - "**/go.sum"
      - "**/go.mod"
      - ".golangci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "**.go"
      - "**/go.sum"
      - "**/go.mod"
      - ".golangci.yml"

permissions:
  contents: read
  # Optional: allow read access to pull requests. Use with `only-new-issues` option.
  # pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: windows-latest
    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MUS_LIBS_PAT }}
          submodules: recursive
          persist-credentials: false
      - name: Stage Discord SDK DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          $dlls = @(Get-ChildItem -Path mus-libs -Recurse -Filter "discord_partner_sdk.dll" -File)
          if ($dlls.Count -eq 0) {
            Write-Error "discord_partner_sdk.dll not found in mus-libs"
            exit 1
          }
          if ($dlls.Count -ne 1) {
            Write-Error "multiple discord_partner_sdk.dll files found; please ensure exactly one match:"
            $dlls | ForEach-Object { $_.FullName }
            exit 1
          }
          Copy-Item -Path $dlls[0].FullName -Destination "lib\discord_partner_sdk.dll" -Force
      - name: Cache golangci-lint cache
        id: cache-golangci-lint
        env:
          cache-name: cache-golangci-lint
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: go generate
        run: go generate ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
  test:
    name: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MUS_LIBS_PAT }}
          submodules: recursive
          persist-credentials: false
      - name: Stage Discord SDK DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          $dlls = @(Get-ChildItem -Path mus-libs -Recurse -Filter "discord_partner_sdk.dll" -File)
          if ($dlls.Count -eq 0) {
            Write-Error "discord_partner_sdk.dll not found in mus-libs"
            exit 1
          }
          if ($dlls.Count -ne 1) {
            Write-Error "multiple discord_partner_sdk.dll files found; please ensure exactly one match:"
            $dlls | ForEach-Object { $_.FullName }
            exit 1
          }
          Copy-Item -Path $dlls[0].FullName -Destination "lib\discord_partner_sdk.dll" -Force
      - name: Cache Go modules
        id: cache-go-mod
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        env:
          cache-name: cache-go-mod
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.cache-name }}-
            ${{ runner.os }}-go-
            ${{ runner.os }}-
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: Run tests
        run: |
          go generate ./...
          go test ./... -v -
